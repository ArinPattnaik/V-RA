name: Keep VÉRA Backend Awake

on:
  schedule:
    # Runs every 8 minutes to prevent Render's 15-minute free tier spin-down
    # (Using 8 minutes because GitHub Actions cron frequently runs late)
    - cron: '*/8 * * * *'
  # Allows triggering the workflow manually from the GitHub Actions UI
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend (via Vercel keep-alive proxy)
        # Wakes up vera-backend on Render via the Vercel frontend's proxy route.
        # The backend's /api/health also pings the ML service health endpoint internally.
        run: curl -s -m 30 https://vera.arinpattnaik.me/api/keep-alive || echo "Backend ping completed (cold start may still be in progress)"

      - name: Ping ML Service directly
        # Directly hits the ML service public URL to ensure it stays warm independently.
        # This is critical — the backend health check has a 25s timeout which may not
        # be enough when the ML service is cold-starting a heavy spaCy model.
        # Uses a longer timeout (50s) to allow the Docker container to fully boot.
        run: curl -s -m 50 https://vera-ml.onrender.com/health || echo "ML service ping completed (cold start may still be in progress)"

      - name: Ping Backend directly
        # Belt-and-suspenders: also ping the backend's health endpoint directly.
        run: curl -s -m 30 https://vera-backend-ouka.onrender.com/api/health || echo "Backend direct ping completed"
